<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4f7cff">
<title>ふたりの立替精算（Google版）</title>
<style>
  :root{--husband:#4f7cff;--wife:#ff6b9d;--bg:#f4f6fb;--card:#fff;--text:#1f2430;--sub:#7a828f;--line:#e7eaf0;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);padding-bottom:78px;-webkit-font-smoothing:antialiased}
  header{background:linear-gradient(120deg,#4f7cff,#6a5cff);color:#fff;padding:16px 18px calc(14px + env(safe-area-inset-top,0));text-align:center;position:relative}
  header h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.5px}
  header p{margin:4px 0 0;font-size:12px;opacity:.85}
  #status{position:absolute;right:12px;top:calc(12px + env(safe-area-inset-top,0));font-size:11px;background:rgba(255,255,255,.2);padding:3px 9px;border-radius:20px;font-weight:700}
  .wrap{max-width:520px;margin:0 auto;padding:14px}
  .card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(30,40,80,.05)}
  .card h2{margin:0 0 12px;font-size:15px;font-weight:700}
  label.fld{display:block;font-size:12px;color:var(--sub);margin:0 0 6px;font-weight:600}
  .row{margin-bottom:14px}
  input[type=number],input[type=text],input[type=date],textarea{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:17px;background:#fbfcfe;color:var(--text);outline:none;font-family:inherit}
  textarea{min-height:70px;font-size:13px}
  input:focus,textarea:focus{border-color:var(--husband)}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;padding:13px 6px;border:1.5px solid var(--line);border-radius:12px;background:#fbfcfe;font-size:14px;font-weight:700;color:var(--sub);cursor:pointer;transition:.15s;line-height:1.3}
  .seg button small{display:block;font-weight:500;font-size:11px;opacity:.8;margin-top:2px}
  .seg button.on[data-who=h]{background:var(--husband);border-color:var(--husband);color:#fff}
  .seg button.on[data-who=w]{background:var(--wife);border-color:var(--wife);color:#fff}
  .seg button.on[data-ratio]{background:#2b3550;border-color:#2b3550;color:#fff}
  .photo-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border:2px dashed #c3ccdd;border-radius:14px;background:#f7f9ff;color:var(--husband);font-size:15px;font-weight:700;cursor:pointer}
  .thumb{margin-top:10px;text-align:center}
  .thumb img{max-width:100%;max-height:180px;border-radius:12px;border:1px solid var(--line)}
  .ocr-status{font-size:12px;color:var(--sub);margin-top:8px;text-align:center;min-height:16px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .chip{padding:8px 12px;background:#eef2ff;border:1px solid #d6e0ff;border-radius:20px;font-size:14px;color:var(--husband);font-weight:700;cursor:pointer}
  .primary{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(120deg,#4f7cff,#6a5cff);color:#fff;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.5px}
  .primary:active{opacity:.85}
  nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0));z-index:20}
  nav button{flex:1;background:none;border:none;padding:6px;font-size:11px;color:var(--sub);cursor:pointer;font-weight:600}
  nav button .ic{display:block;font-size:20px;margin-bottom:2px}
  nav button.on{color:var(--husband)}
  .hidden{display:none}
  .monthbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .monthbar button{background:#fff;border:1px solid var(--line);border-radius:10px;width:40px;height:40px;font-size:18px;cursor:pointer}
  .monthbar .m{font-size:17px;font-weight:800}
  .item{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .badge{width:44px;height:44px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff}
  .badge.h{background:var(--husband)}.badge.w{background:var(--wife)}
  .item .info{flex:1;min-width:0}.item .info .top{font-size:15px;font-weight:700}
  .item .info .sub{font-size:12px;color:var(--sub);margin-top:2px}
  .item .amt{font-size:16px;font-weight:800;white-space:nowrap}
  .del{background:none;border:none;color:#c9ced8;font-size:20px;cursor:pointer;padding:4px}
  .edit{background:none;border:none;color:#9aa3b2;font-size:17px;cursor:pointer;padding:4px}
  #editModal{position:fixed;inset:0;z-index:110;background:rgba(20,28,50,.45);display:flex;align-items:center;justify-content:center;padding:20px}
  #editModal.hidden{display:none}
  #editModal .ed-card{background:#fff;border-radius:18px;padding:20px;width:100%;max-width:420px;box-shadow:0 12px 44px rgba(0,0,0,.28)}
  #editModal .ed-card h2{margin:0 0 14px;font-size:16px;font-weight:700}
  .empty{text-align:center;color:var(--sub);padding:30px 10px;font-size:14px}
  .ratiosel{margin-top:7px;font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:#fbfcfe;color:var(--text);max-width:190px;font-family:inherit}
  .pending-note{background:#fff6e8;border:1px solid #f3d59b;color:#96631a;border-radius:12px;padding:12px 14px;font-size:12.5px;line-height:1.6;margin-top:12px}
  .totrow{display:flex;justify-content:space-between;padding:10px 2px;font-size:15px;border-bottom:1px dashed var(--line)}
  .totrow .v{font-weight:800}
  .settle-box{margin-top:14px;background:linear-gradient(120deg,#eaf1ff,#f3eeff);border-radius:14px;padding:18px;text-align:center}
  .settle-box .lbl{font-size:13px;color:var(--sub);font-weight:700}
  .settle-box .big{font-size:30px;font-weight:900;margin:6px 0}
  .settle-box .dir{font-size:15px;font-weight:800}
  .arrow-h{color:var(--wife)}.arrow-w{color:var(--husband)}
  .mini{font-size:11px;color:var(--sub);margin-top:6px;line-height:1.5}
  .flash{position:fixed;left:50%;top:70px;transform:translateX(-50%);background:#1fb87a;color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:150;opacity:0;transition:.3s;pointer-events:none}
  .flash.show{opacity:1;top:80px}
  .settings-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  .settings-row input{flex:1}
  .link{color:var(--husband);font-size:13px;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0}
  #lockScreen{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,#4f7cff,#6a5cff);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:24px}
  #lockScreen.hidden{display:none}
  #lockScreen .lk-ic{font-size:34px;margin-bottom:6px}
  #lockScreen .lk-title{font-size:18px;font-weight:800;margin-bottom:4px}
  #lockScreen .lk-sub{font-size:13px;opacity:.85;margin-bottom:22px;min-height:18px;text-align:center}
  .dots{display:flex;gap:16px;margin-bottom:26px}
  .dots span{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.7)}
  .dots span.fill{background:#fff;border-color:#fff}
  .dots.shake{animation:sh .4s}
  @keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
  .keypad{display:grid;grid-template-columns:repeat(3,74px);gap:16px;justify-content:center}
  .keypad button{width:74px;height:74px;border-radius:50%;border:1.5px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);color:#fff;font-size:26px;font-weight:600;cursor:pointer}
  .keypad button:active{background:rgba(255,255,255,.3)}
  .keypad button.blank{background:none;border:none;cursor:default}
  #lockScreen .lk-forgot{margin-top:22px;color:#fff;opacity:.85;font-size:13px;text-decoration:underline;background:none;border:none;cursor:pointer}
  #setupScreen{position:fixed;inset:0;z-index:90;background:var(--bg);overflow:auto;padding:20px}
  #setupScreen.hidden{display:none}
  #setupScreen .box{max-width:520px;margin:0 auto}
  #setupScreen h2{font-size:19px;margin:6px 0 4px}
  #setupScreen p.desc{font-size:13px;color:var(--sub);line-height:1.6;margin:0 0 16px}
  .step-note{font-size:12px;color:var(--sub);margin:-6px 0 14px;line-height:1.5}
</style>
</head>
<body>

<!-- ============ PINロック画面 ============ -->
<div id="lockScreen" class="hidden">
  <div class="lk-ic">🔒</div>
  <div class="lk-title" id="lkTitle">暗証番号を入力</div>
  <div class="lk-sub" id="lkSub"></div>
  <div class="dots" id="lkDots"><span></span><span></span><span></span><span></span></div>
  <div class="keypad" id="lkPad">
    <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
    <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
    <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
    <button class="blank"></button><button data-k="0">0</button><button data-k="del">⌫</button>
  </div>
  <button class="lk-forgot hidden" id="lkForgot">暗証番号を忘れた場合</button>
</div>

<!-- ============ 接続設定画面 ============ -->
<div id="setupScreen" class="hidden">
  <div class="box">
    <h2>🔗 ふたりで共有する設定</h2>
    <p class="desc">ふたりで同じ「合言葉」を入れると、同じデータを共有できます。<br>この設定は<b>各端末で最初の1回だけ</b>です（次回からは暗証番号だけで開けます）。</p>
    <div class="card">
      <div class="row" id="urlRow">
        <label class="fld">① ウェブアプリのURL</label>
        <textarea id="urlInput" placeholder="https://script.google.com/macros/s/××××/exec を貼り付け" autocapitalize="off" autocorrect="off"></textarea>
        <div class="step-note">手順書に従い、Apps Scriptの「デプロイ」で発行されたURL（末尾が /exec）を貼り付けます。</div>
      </div>
      <div class="row">
        <label class="fld">ふたりの合言葉（ペアコード）</label>
        <input id="roomInput" type="text" placeholder="例：miyajima-2026-himitsu" autocapitalize="off" autocorrect="off">
        <div class="step-note">夫婦で同じ言葉を決めて、両方の端末で同じものを入力します。他人に推測されにくい長めの言葉に。</div>
      </div>
      <button class="primary" id="connectBtn">この内容でつなぐ</button>
      <div class="ocr-status" id="setupStatus"></div>
    </div>
  </div>
</div>

<header>
  <h1>ふたりの立替精算</h1>
  <p>レシートを撮って、月末にまとめて精算</p>
  <span id="status">…</span>
</header>

<div class="flash" id="flash"></div>

<!-- ============ 記録タブ ============ -->
<section id="tab-add" class="wrap">
  <div class="card">
    <h2>レシートを記録</h2>
    <div class="row">
      <label class="photo-btn" for="photo">📷 撮影 / 写真・ファイルから選ぶ</label>
      <input id="photo" type="file" accept="image/*" class="hidden">
      <div class="thumb" id="thumb"></div>
      <div class="ocr-status" id="ocrStatus"></div>
      <div class="chips" id="chips"></div>
    </div>
    <div class="row">
      <label class="fld">金額（円）</label>
      <input id="amount" type="number" inputmode="numeric" placeholder="0" min="0">
    </div>
    <div class="row">
      <label class="fld">支払った人</label>
      <div class="seg" id="segWho">
        <button type="button" data-who="h" class="on" id="whoH">夫</button>
        <button type="button" data-who="w" id="whoW">妻</button>
      </div>
    </div>
    <div class="row">
      <label class="fld">負担の割合</label>
      <div class="seg" id="segRatio">
        <button type="button" data-ratio="0.66666667" class="on">夫 2/3<small>妻 1/3</small></button>
        <button type="button" data-ratio="0.5">夫 1/2<small>妻 1/2</small></button>
        <button type="button" data-ratio="-1">あとで<small>配分を決める</small></button>
      </div>
    </div>
    <div class="row">
      <label class="fld">日付</label>
      <input id="date" type="date">
    </div>
    <div class="row">
      <label class="fld">メモ（任意）</label>
      <input id="memo" type="text" placeholder="スーパー、外食 など">
    </div>
    <button class="primary" id="saveBtn">この内容で記録する</button>
  </div>
</section>

<!-- ============ 履歴タブ ============ -->
<section id="tab-list" class="wrap hidden">
  <div class="monthbar"><button id="listPrev">‹</button><div class="m" id="listMonth"></div><button id="listNext">›</button></div>
  <div class="card" id="listCard"></div>
</section>

<!-- ============ 精算タブ ============ -->
<section id="tab-settle" class="wrap hidden">
  <div class="monthbar"><button id="setPrev">‹</button><div class="m" id="setMonth"></div><button id="setNext">›</button></div>
  <div class="card"><h2>この月の精算</h2><div id="settleBody"></div></div>
  <div class="card">
    <h2>設定</h2>
    <div class="settings-row"><label class="fld" style="width:70px;margin:0">夫の名前</label><input id="nameH" type="text" placeholder="たかゆき"></div>
    <div class="settings-row"><label class="fld" style="width:70px;margin:0">妻の名前</label><input id="nameW" type="text" placeholder="あやこ"></div>
    <button class="link" id="saveNamesBtn">名前を保存</button>
    <div style="margin-top:16px"><button class="link" id="changePinBtn">暗証番号を変更</button></div>
    <div style="margin-top:12px"><button class="link" id="reconfigBtn">共有の接続設定をやり直す</button></div>
    <div style="margin-top:12px"><button class="link" id="exportBtn">データを書き出し（バックアップ）</button></div>
  </div>
</section>

<!-- ============ 編集モーダル ============ -->
<div id="editModal" class="hidden">
  <div class="ed-card">
    <h2>記録を編集</h2>
    <div class="row"><label class="fld">メモ</label><input id="edMemo" type="text" placeholder="スーパー、外食 など"></div>
    <div class="row"><label class="fld">日付</label><input id="edDate" type="date"></div>
    <div class="row"><label class="fld">支払った人</label>
      <div class="seg" id="edWho">
        <button type="button" data-who="h" id="edWhoH">夫</button>
        <button type="button" data-who="w" id="edWhoW">妻</button>
      </div>
    </div>
    <button class="primary" id="edSave">保存する</button>
    <button class="link" id="edDelete" style="display:block;margin:14px auto 6px;color:#e14b4b">この記録を削除</button>
    <button class="link" id="edCancel" style="display:block;margin:0 auto">キャンセル</button>
  </div>
</div>

<nav>
  <button data-tab="add" class="on"><span class="ic">＋</span>記録</button>
  <button data-tab="list"><span class="ic">📋</span>履歴</button>
  <button data-tab="settle"><span class="ic">💴</span>精算</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const $=id=>document.getElementById(id);

/* ===================== 保存キー ===================== */
const PKEY='futari_pin_v1', URLKEY='futari_gs_url_v1', ROOMKEY='futari_room_v1';
/* ↓ あらかじめ組み込んだ接続先URL。これがあると、利用者は合言葉だけ入れればつながります。 */
const DEFAULT_API_URL="https://script.google.com/macros/s/AKfycbwQuPG4nvIaRYYeSr7oyWceA-pJKqgnwPtdgwX_HCuFVs2xmCB9TXuKzfyOvKTv7uhMBw/exec";

/* ===================== 状態 ===================== */
let records=[], names={h:'たかゆき',w:'あやこ'};
let namesInitDone=false;
let cur={who:'h',ratio:0.66666667,thumb:null};
let listMonth=ym(new Date()), setMonth=ym(new Date());
let apiUrl='', room='', pollTimer=null, busy=false, pendingSetup=false;

function ym(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function monthLabel(s){const[y,m]=s.split('-');return `${y}年 ${parseInt(m)}月`;}
function yen(n){return '¥'+Math.round(n).toLocaleString('ja-JP');}
function shiftMonth(s,delta){const[y,m]=s.split('-').map(Number);return ym(new Date(y,m-1+delta,1));}
function esc(s){return(s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let flashT;
function flash(msg,err){const f=$('flash');f.textContent=msg;f.style.background=err?'#e14b4b':'#1fb87a';f.classList.add('show');clearTimeout(flashT);flashT=setTimeout(()=>f.classList.remove('show'),1900);}
function setStatus(t,ok){const s=$('status');s.textContent=t;s.style.background=ok?'rgba(120,255,190,.28)':'rgba(255,150,150,.32)';}

/* ===================== 入力ウィジェット ===================== */
$('date').value=new Date().toISOString().slice(0,10);
$('segWho').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;cur.who=b.dataset.who;[...$('segWho').children].forEach(x=>x.classList.toggle('on',x===b));});
$('segRatio').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;cur.ratio=parseFloat(b.dataset.ratio);[...$('segRatio').children].forEach(x=>x.classList.toggle('on',x===b));});

/* --- 写真 + OCR --- */
$('photo').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  $('chips').innerHTML='';
  const big=await resizeImage(file,900);
  cur.thumb=await resizeImage(file,200,0.6);
  $('thumb').innerHTML=`<img src="${cur.thumb}">`;
  runOCR(big);
});
function resizeImage(file,maxW,q){
  return new Promise(res=>{const img=new Image();img.onload=()=>{const s=Math.min(1,maxW/img.width),w=img.width*s,h=img.height*s;const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q||0.8));};img.src=URL.createObjectURL(file);});
}
async function runOCR(dataUrl){
  if(typeof Tesseract==='undefined'){$('ocrStatus').textContent='※金額は手入力してください。';return;}
  $('ocrStatus').textContent='レシートを読み取り中…（数十秒かかることがあります）';
  try{
    const{data}=await Tesseract.recognize(dataUrl,'jpn+eng',{logger:m=>{if(m.status==='recognizing text')$('ocrStatus').textContent=`読み取り中… ${Math.round(m.progress*100)}%`;}});
    const cand=extractAmounts(data.text);
    if(cand.length){$('amount').value=cand[0];$('ocrStatus').textContent='読み取り結果を金額に入れました。違ったら候補タップ／手入力で修正できます。';$('chips').innerHTML=cand.slice(0,6).map(v=>`<span class="chip" data-v="${v}">¥${v.toLocaleString()}</span>`).join('');}
    else{$('ocrStatus').textContent='金額をうまく読めませんでした。手入力してください。';}
  }catch(err){$('ocrStatus').textContent='自動読み取りに失敗しました。金額は手入力してください。';}
}
$('chips').addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;$('amount').value=c.dataset.v;});
function extractAmounts(text){
  const lines=text.split('\n');
  const kw=/(合[　 ]*計|お?[　 ]*会[　 ]*計|総[　 ]*額|税[　 ]*込|お預り|お買上)/;
  const grab=line=>[...line.matchAll(/[¥￥]?\s*([0-9][0-9,\.]{1,9})\s*円?/g)].map(m=>parseInt(m[1].replace(/[,\.]/g,''),10)).filter(n=>n>0&&n<1000000);
  let prioritized=[],all=[];
  lines.forEach(l=>{const nums=grab(l);all.push(...nums);if(kw.test(l))prioritized.push(...nums);});
  const uniq=a=>[...new Set(a)];
  return (prioritized.length?uniq(prioritized):uniq(all)).sort((a,b)=>b-a);
}

/* ===================== Google スプレッドシート通信 ===================== */
async function reload(){
  if(busy||!apiUrl||!room)return;
  try{
    const res=await fetch(apiUrl+'?action=load&room='+encodeURIComponent(room),{method:'GET'});
    const j=await res.json();
    records=(j.records||[]).map(r=>({id:String(r.id),date:String(r.date).slice(0,10),who:r.who,ratio:Number(r.ratio),amount:Number(r.amount),memo:r.memo||'',thumb:r.thumb||''}));
    if(j.names)names=j.names;
    applyNames();setStatus('● 同期中',true);renderList();renderSettle();
    maybeSetDefaultNames();
    if(pendingSetup){hideSetup();flash('つながりました！');pendingSetup=false;}
  }catch(e){
    setStatus('接続エラー',false);
    if(pendingSetup)$('setupStatus').textContent='⚠ 接続できません。URLと「アクセスできるユーザー：全員」の公開設定を確認してください';
  }
}
async function apiPost(body){
  if(!apiUrl||!room){flash('先に共有の接続設定をしてください',true);throw new Error('no config');}
  busy=true;
  try{
    const res=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({room},body))});
    const j=await res.json();
    if(j&&j.records){records=j.records.map(r=>({id:String(r.id),date:String(r.date).slice(0,10),who:r.who,ratio:Number(r.ratio),amount:Number(r.amount),memo:r.memo||'',thumb:r.thumb||''}));if(j.names)names=j.names;applyNames();renderList();renderSettle();}
    return j;
  } finally { busy=false; }
}

/* --- 保存 --- */
$('saveBtn').addEventListener('click',async()=>{
  const amt=parseInt($('amount').value,10);
  if(!amt||amt<=0){flash('金額を入力してください',true);$('amount').focus();return;}
  const rec={id:Date.now(),amount:amt,who:cur.who,ratio:cur.ratio,date:$('date').value,memo:$('memo').value.trim(),thumb:cur.thumb||''};
  try{
    await apiPost({action:'add',record:rec});
    flash('記録しました！');
    $('amount').value='';$('memo').value='';$('thumb').innerHTML='';$('chips').innerHTML='';$('ocrStatus').textContent='';cur.thumb=null;$('photo').value='';
  }catch(e){flash('保存に失敗しました',true);}
});

/* ===================== 履歴 ===================== */
function recordsOf(month){return records.filter(r=>r.date&&r.date.slice(0,7)===month).sort((a,b)=>b.date.localeCompare(a.date)||String(b.id).localeCompare(String(a.id)));}
function renderList(){
  $('listMonth').textContent=monthLabel(listMonth);
  const rs=recordsOf(listMonth);
  if(!rs.length){$('listCard').innerHTML='<div class="empty">この月の記録はまだありません</div>';return;}
  $('listCard').innerHTML=rs.map(r=>{
    const nm=r.who==='h'?names.h:names.w;
    const p=r.ratio<0;
    const o1=(!p&&r.ratio>0.5)?'selected':'';
    const o2=(!p&&r.ratio>=0&&r.ratio<=0.5)?'selected':'';
    const o3=p?'selected':'';
    const nh=esc(names.h),nw=esc(names.w);
    return `<div class="item"><div class="badge ${r.who}">${esc(nm).slice(0,2)}</div>
      <div class="info"><div class="top">${r.memo?esc(r.memo):'（メモなし）'}</div>
      <div class="sub">${r.date.slice(5).replace('-','/')}${p?'・<span style="color:#e0900f;font-weight:700">配分あとで</span>':''}</div>
      <select class="ratiosel" data-id="${r.id}">
        <option value="0.66666667" ${o1}>${nh}2/3・${nw}1/3</option>
        <option value="0.5" ${o2}>折半（1/2ずつ）</option>
        <option value="-1" ${o3}>あとで配分を決める</option>
      </select></div>
      <div class="amt">${yen(r.amount)}</div><button class="edit" data-id="${r.id}">✎</button><button class="del" data-id="${r.id}">✕</button></div>`;
  }).join('');
}
$('listCard').addEventListener('click',async e=>{
  const ed=e.target.closest('.edit');if(ed){openEdit(ed.dataset.id);return;}
  const b=e.target.closest('.del');if(!b)return;
  if(confirm('この記録を削除しますか？')){try{await apiPost({action:'delete',id:b.dataset.id});}catch(err){flash('削除に失敗しました',true);}}
});
$('listCard').addEventListener('change',async e=>{
  const s=e.target.closest('.ratiosel');if(!s)return;
  await updateRatio(s.dataset.id, parseFloat(s.value));
});
/* 記録の変更＝新しい内容で追加してから古い記録を削除（サーバー側の変更は不要） */
async function updateRecord(id,changes){
  const r=records.find(x=>String(x.id)===String(id));
  if(!r)return;
  const base={amount:r.amount,who:r.who,ratio:r.ratio,date:r.date,memo:r.memo||'',thumb:r.thumb||''};
  const newRec=Object.assign({id:Date.now()},base,changes);
  await apiPost({action:'add',record:newRec});
  await apiPost({action:'delete',id:id});
}
async function updateRatio(id,newRatio){
  const r=records.find(x=>String(x.id)===String(id));
  if(!r||Number(r.ratio)===newRatio)return;
  try{await updateRecord(id,{ratio:newRatio});flash('配分を変更しました');}catch(e){flash('変更に失敗しました',true);}
}
/* --- 編集モーダル（メモ・日付・支払った人） --- */
let currentEditId=null, edWho='h';
function updateEdWho(){[...$('edWho').children].forEach(x=>x.classList.toggle('on',x.dataset.who===edWho));}
function openEdit(id){
  const r=records.find(x=>String(x.id)===String(id));if(!r)return;
  currentEditId=id;
  $('edWhoH').textContent=names.h;$('edWhoW').textContent=names.w;
  $('edMemo').value=r.memo||'';$('edDate').value=r.date;edWho=r.who;updateEdWho();
  $('editModal').classList.remove('hidden');
}
$('edWho').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;edWho=b.dataset.who;updateEdWho();});
$('edCancel').onclick=()=>{$('editModal').classList.add('hidden');currentEditId=null;};
$('edSave').onclick=async()=>{
  if(!currentEditId)return;
  const memo=$('edMemo').value.trim(),date=$('edDate').value;
  if(!date){flash('日付を入れてください',true);return;}
  const id=currentEditId;$('editModal').classList.add('hidden');currentEditId=null;
  try{await updateRecord(id,{memo,date,who:edWho});flash('変更しました');}catch(e){flash('変更に失敗しました',true);}
};
$('edDelete').onclick=async()=>{
  if(!currentEditId)return;
  if(confirm('この記録を削除しますか？')){const id=currentEditId;$('editModal').classList.add('hidden');currentEditId=null;try{await apiPost({action:'delete',id});}catch(e){flash('削除に失敗しました',true);}}
};
$('listPrev').onclick=()=>{listMonth=shiftMonth(listMonth,-1);renderList();};
$('listNext').onclick=()=>{listMonth=shiftMonth(listMonth,1);renderList();};

/* ===================== 精算 ===================== */
function renderSettle(){
  $('setMonth').textContent=monthLabel(setMonth);
  const rs=recordsOf(setMonth);const body=$('settleBody');
  if(!rs.length){body.innerHTML='<div class="empty">この月の記録はまだありません</div>';return;}
  let paidH=0,paidW=0,oweH=0,oweW=0,total=0,decidedTotal=0,pendingCount=0,pendingSum=0;
  rs.forEach(r=>{
    total+=r.amount;
    if(Number(r.ratio)<0){pendingCount++;pendingSum+=r.amount;return;}
    decidedTotal+=r.amount;
    if(r.who==='h')paidH+=r.amount;else paidW+=r.amount;
    const hs=r.amount*r.ratio;oweH+=hs;oweW+=r.amount-hs;
  });
  const balH=paidH-oweH;const nh=esc(names.h),nw=esc(names.w),amt=Math.abs(balH);
  const pendNote=pendingCount>0?`<div class="pending-note">⚠ 配分が未定の記録が ${pendingCount}件（${yen(pendingSum)}）あります。<br>「履歴」でその記録の配分を選ぶと、精算に反映されます。（下の精算額には含まれていません）</div>`:'';
  let sh;
  if(decidedTotal===0){sh=`<div class="settle-box"><div class="lbl">精算</div><div class="big">－</div><div class="dir">配分が決まった記録がまだありません</div></div>`;}
  else if(Math.round(amt)===0){sh=`<div class="settle-box"><div class="lbl">精算</div><div class="big">✓ ちょうど</div><div class="dir">精算の必要はありません</div></div>`;}
  else if(balH>0){sh=`<div class="settle-box"><div class="lbl">精算金額</div><div class="big">${yen(amt)}</div><div class="dir arrow-w">${nw} → ${nh} へ支払う</div><div class="mini">${nw}さんが${nh}さんに ${yen(amt)} 渡すと、この月の負担が公平になります。</div></div>`;}
  else{sh=`<div class="settle-box"><div class="lbl">精算金額</div><div class="big">${yen(amt)}</div><div class="dir arrow-h">${nh} → ${nw} へ支払う</div><div class="mini">${nh}さんが${nw}さんに ${yen(amt)} 渡すと、この月の負担が公平になります。</div></div>`;}
  body.innerHTML=`<div class="totrow"><span>今月の支出合計</span><span class="v">${yen(total)}</span></div>
    <div class="totrow"><span>${nh}が支払った額</span><span class="v" style="color:var(--husband)">${yen(paidH)}</span></div>
    <div class="totrow"><span>${nw}が支払った額</span><span class="v" style="color:var(--wife)">${yen(paidW)}</span></div>
    <div class="totrow"><span>${nh}の負担すべき額</span><span class="v">${yen(oweH)}</span></div>
    <div class="totrow"><span>${nw}の負担すべき額</span><span class="v">${yen(oweW)}</span></div>${pendNote}${sh}`;
}
$('setPrev').onclick=()=>{setMonth=shiftMonth(setMonth,-1);renderSettle();};
$('setNext').onclick=()=>{setMonth=shiftMonth(setMonth,1);renderSettle();};

/* --- 名前（共有） --- */
function applyNames(){$('whoH').firstChild.nodeValue=names.h;$('whoW').firstChild.nodeValue=names.w;if(document.activeElement!==$('nameH'))$('nameH').value=names.h;if(document.activeElement!==$('nameW'))$('nameW').value=names.w;}
/* 初回接続時、名前が既定の「夫／妻」のままなら「たかゆき／あやこ」に自動設定（1回だけ） */
function maybeSetDefaultNames(){
  if(namesInitDone)return;
  namesInitDone=true;
  if(names.h==='夫'&&names.w==='妻'){names={h:'たかゆき',w:'あやこ'};applyNames();renderList();renderSettle();apiPost({action:'names',names}).catch(()=>{});}
}
$('saveNamesBtn').onclick=async()=>{
  names={h:($('nameH').value.trim()||'たかゆき'),w:($('nameW').value.trim()||'あやこ')};applyNames();
  try{await apiPost({action:'names',names});flash('名前を保存しました');}catch(e){flash('保存に失敗しました',true);}
};
$('exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify({records,names},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`kakeibo_${ym(new Date())}.json`;a.click();};

/* ===================== ナビ ===================== */
document.querySelector('nav').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;const t=b.dataset.tab;
  ['add','list','settle'].forEach(x=>$('tab-'+x).classList.toggle('hidden',x!==t));
  [...document.querySelectorAll('nav button')].forEach(x=>x.classList.toggle('on',x===b));
  if(t==='list')renderList();if(t==='settle')renderSettle();
});

/* ===================== PINロック ===================== */
function hashPin(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0;return 'h'+h;}
function getPin(){return localStorage.getItem(PKEY);}
function setPinVal(v){localStorage.setItem(PKEY,hashPin(v));}
let lk={mode:'enter',buf:'',temp:null};
const lockEl=$('lockScreen');
function showLock(mode){lk.mode=mode;lk.buf='';lk.temp=null;lockEl.classList.remove('hidden');document.body.style.overflow='hidden';updateLockUI();}
function hideLock(){lockEl.classList.add('hidden');document.body.style.overflow='';}
function updateLockUI(){
  const t={enter:'暗証番号を入力',set:'暗証番号を設定',confirm:'もう一度入力','change-verify':'現在の暗証番号を入力'};
  const s={enter:'',set:'この端末用の4桁の番号を決めてください',confirm:'確認のためもう一度','change-verify':''};
  $('lkTitle').textContent=t[lk.mode];$('lkSub').textContent=s[lk.mode]||'';
  $('lkForgot').classList.toggle('hidden',!(lk.mode==='enter'||lk.mode==='change-verify'));drawDots();
}
function drawDots(){[...$('lkDots').children].forEach((d,i)=>d.classList.toggle('fill',i<lk.buf.length));}
function shake(){const d=$('lkDots');d.classList.add('shake');setTimeout(()=>d.classList.remove('shake'),400);}
$('lkPad').addEventListener('click',e=>{const b=e.target.closest('button');if(!b||!b.dataset.k)return;if(b.dataset.k==='del'){lk.buf=lk.buf.slice(0,-1);drawDots();return;}if(lk.buf.length>=4)return;lk.buf+=b.dataset.k;drawDots();if(lk.buf.length===4)setTimeout(handlePin,120);});
function handlePin(){
  const v=lk.buf;
  if(lk.mode==='set'){lk.temp=v;lk.buf='';lk.mode='confirm';updateLockUI();return;}
  if(lk.mode==='confirm'){if(v===lk.temp){setPinVal(v);flash('暗証番号を設定しました');hideLock();afterUnlock();}else{$('lkSub').textContent='番号が一致しません。もう一度設定してください';lk.buf='';lk.temp=null;lk.mode='set';shake();drawDots();}return;}
  if(lk.mode==='enter'){if(hashPin(v)===getPin()){hideLock();afterUnlock();}else{$('lkSub').textContent='番号が違います';lk.buf='';shake();drawDots();}return;}
  if(lk.mode==='change-verify'){if(hashPin(v)===getPin()){lk.buf='';lk.mode='set';$('lkSub').textContent='新しい暗証番号を入力';updateLockUI();}else{$('lkSub').textContent='番号が違います';lk.buf='';shake();drawDots();}return;}
}
$('lkForgot').addEventListener('click',()=>{if(confirm('暗証番号を再設定します（この端末のロックのみ。共有データは消えません）。続けますか？')){localStorage.removeItem(PKEY);showLock('set');}});
$('changePinBtn').addEventListener('click',()=>showLock('change-verify'));

/* ===================== 接続設定 ===================== */
function showSetup(){$('setupScreen').classList.remove('hidden');document.body.style.overflow='hidden';}
function hideSetup(){$('setupScreen').classList.add('hidden');document.body.style.overflow='';}
$('reconfigBtn').addEventListener('click',()=>{$('urlInput').value=localStorage.getItem(URLKEY)||'';$('roomInput').value=localStorage.getItem(ROOMKEY)||'';showSetup();});
$('connectBtn').addEventListener('click',()=>{
  const u=($('urlInput').value.trim()||DEFAULT_API_URL);
  const rm=$('roomInput').value.trim().replace(/[^0-9A-Za-z\-_一-龠ぁ-んァ-ヶ]/g,'-');
  if(!/^https:\/\/script\.google\.com\/macros\/.+\/exec$/.test(u)){$('setupStatus').textContent='⚠ URLは https://script.google.com/macros/… で始まり /exec で終わります';return;}
  if(rm.length<4){$('setupStatus').textContent='⚠ 合言葉は4文字以上にしてください';return;}
  localStorage.setItem(URLKEY,u);localStorage.setItem(ROOMKEY,rm);
  $('setupStatus').textContent='接続しています…';
  connect(true);
});
function connect(fromSetup){
  apiUrl=localStorage.getItem(URLKEY)||DEFAULT_API_URL;room=localStorage.getItem(ROOMKEY)||'';
  if(!apiUrl||!room){showSetup();return;}
  pendingSetup=fromSetup;setStatus('接続中…',false);
  reload();
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(reload,6000);
}

/* ===================== 起動 ===================== */
function afterUnlock(){
  applyNames();
  if(!localStorage.getItem(ROOMKEY))showSetup();
  else connect(false);
}
/* URLをあらかじめ組み込んでいる場合は、設定画面のURL欄を隠して合言葉だけにする */
if(DEFAULT_API_URL){ $('urlInput').value=DEFAULT_API_URL; if($('urlRow'))$('urlRow').style.display='none'; }
function boot(){applyNames();if(!getPin())showLock('set');else showLock('enter');}
boot();
</script>
